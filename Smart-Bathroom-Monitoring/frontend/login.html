<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBathroom – Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.10); padding: 40px 36px; width: 100%; max-width: 420px; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon { width: 44px; height: 44px; background: #1a3a8f; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 16px; }
  .logo-text { font-size: 20px; font-weight: 700; color: #1a3a8f; }
  .logo-sub { font-size: 12px; color: #888; }
  h2 { font-size: 22px; color: #1a2340; margin-bottom: 6px; }
  p.sub { color: #666; font-size: 14px; margin-bottom: 24px; }
  label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid #dde1ea; border-radius: 8px; font-size: 14px; outline: none; transition: border .2s; margin-bottom: 16px; }
  input:focus { border-color: #2563eb; }
  .btn { width: 100%; padding: 12px; background: #2563eb; color: #fff; font-size: 15px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: background .2s; }
  .btn:hover { background: #1a4fc7; }
  .link-row { text-align: center; margin-top: 16px; font-size: 13px; color: #666; }
  .link-row a { color: #2563eb; text-decoration: none; font-weight: 600; }
  .error { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">SB</div>
    <div>
      <div class="logo-text">SmartBathroom</div>
      <div class="logo-sub">Sistema de Monitoramento</div>
    </div>
  </div>
  <h2>Bem-vindo!</h2>
  <p class="sub">Faça login para continuar.</p>
  <div class="error" id="err"></div>
  <label>RA ou usuário</label>
  <input type="text" id="identifier" placeholder="Ex: 1234567 ou limpeza.atitus" autocomplete="username">
  <label>Senha</label>
  <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password">
  <button class="btn" onclick="doLogin()">Entrar</button>
  <div class="link-row">Não tem conta? <a href="/cadastro">Cadastre-se</a></div>
</div>
<script>
async function doLogin() {
  const identifier = document.getElementById('identifier').value.trim();
  const password = document.getElementById('password').value.trim();
  const err = document.getElementById('err');
  err.style.display = 'none';
  if (!identifier || !password) { err.textContent = 'Preencha todos os campos.'; err.style.display = 'block'; return; }
  const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({identifier, password}) });
  const data = await res.json();
  if (data.ok) {
    if (data.role === 'aluno') window.location.href = '/aluno';
    else if (data.role === 'limpeza') window.location.href = '/limpeza';
  } else {
    err.textContent = data.msg;
    err.style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
